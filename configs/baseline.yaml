data:
  image_dir: data/images
  mask_dir: data/masks
  img_size: 512

model:
  architecture: unet
  encoder: resnet50
  encoder_weights: imagenet
  in_channels: 3
  classes: 1

train:
  epochs: 5
  batch_size: 4
  lr: 0.0001

output:
  prediction_dir: outputs/predictions
  graph_dir: outputs/graphs